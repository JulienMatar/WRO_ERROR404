<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect x="0" y="0" width="1400" height="1000" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="40" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Team ERROR404 — WRO Future Engineers 2026</text>
  <text x="700" y="65" font-size="16" text-anchor="middle" fill="#555">Electromechanical Wiring Diagram</text>

  <!-- Legend -->
  <g transform="translate(1050,90)">
    <rect x="0" y="0" width="320" height="90" fill="#fafafa" stroke="#ccc" stroke-width="1" rx="6"/>
    <line x1="15" y1="20" x2="55" y2="20" stroke="#d1352a" stroke-width="4"/>
    <text x="65" y="25" font-size="14" fill="#333">Power (11.1V battery line)</text>
    <line x1="15" y1="45" x2="55" y2="45" stroke="#2266cc" stroke-width="4"/>
    <text x="65" y="50" font-size="14" fill="#333">Regulated 5V logic power</text>
    <line x1="15" y1="70" x2="55" y2="70" stroke="#2a9d3f" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="65" y="75" font-size="14" fill="#333">Signal / data / control</text>
  </g>

  <!-- ===================== POWER SECTION (left column) ===================== -->

  <!-- Active Battery -->
  <rect x="40" y="110" width="160" height="70" rx="8" fill="#ffe8e6" stroke="#d1352a" stroke-width="2"/>
  <text x="120" y="138" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Active LiPo 11.1V</text>
  <text x="120" y="156" font-size="12" text-anchor="middle" fill="#555">(T-plug connected)</text>

  <!-- Spare Battery -->
  <rect x="40" y="200" width="160" height="60" rx="8" fill="#fff3f0" stroke="#d1352a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="120" y="225" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Spare LiPo 11.1V</text>
  <text x="120" y="243" font-size="11" text-anchor="middle" fill="#777">(swap via T-plug, not simultaneous)</text>

  <!-- swap arrow between batteries -->
  <path d="M 200 190 Q 220 195 200 205" fill="none" stroke="#999" stroke-width="1.5"/>
  <path d="M 200 205 Q 220 200 200 190" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Main Power Switch -->
  <rect x="260" y="125" width="150" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="335" y="146" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Main Power</text>
  <text x="335" y="163" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Switch</text>

  <!-- Battery to switch -->
  <line x1="200" y1="145" x2="260" y2="150" stroke="#d1352a" stroke-width="4"/>

  <!-- Push Button (Start) -->
  <rect x="260" y="200" width="150" height="55" rx="8" fill="#eef7ff" stroke="#2266cc" stroke-width="2"/>
  <text x="335" y="222" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Push Button</text>
  <text x="335" y="239" font-size="12" text-anchor="middle" fill="#555">(Start trigger, GPIO)</text>

  <!-- Buck Converter -->
  <rect x="460" y="110" width="180" height="80" rx="8" fill="#eef7ff" stroke="#2266cc" stroke-width="2"/>
  <text x="550" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DC-DC Buck</text>
  <text x="550" y="153" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Converter</text>
  <text x="550" y="171" font-size="11" text-anchor="middle" fill="#555">36V-rated in → 5V out</text>

  <!-- Switch to buck converter (power) -->
  <line x1="410" y1="145" x2="460" y2="145" stroke="#d1352a" stroke-width="4"/>

  <!-- L9110 Motor Driver -->
  <rect x="460" y="230" width="180" height="80" rx="8" fill="#ffe8e6" stroke="#d1352a" stroke-width="2"/>
  <text x="550" y="255" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">L9110</text>
  <text x="550" y="273" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Motor Driver</text>
  <text x="550" y="291" font-size="11" text-anchor="middle" fill="#555">(dual H-bridge)</text>

  <!-- Switch to L9110 (direct 11.1V, bypassing buck) -->
  <path d="M 335 175 L 335 270 L 460 270" fill="none" stroke="#d1352a" stroke-width="4"/>

  <!-- 25GA-370 Motor -->
  <rect x="700" y="230" width="170" height="80" rx="8" fill="#fff8e8" stroke="#c98a1a" stroke-width="2"/>
  <text x="785" y="258" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">25GA-370</text>
  <text x="785" y="276" font-size="13" text-anchor="middle" fill="#1a1a1a">Drive Motor</text>
  <text x="785" y="294" font-size="11" text-anchor="middle" fill="#555">200 RPM + gearbox</text>

  <line x1="640" y1="270" x2="700" y2="270" stroke="#d1352a" stroke-width="4"/>

  <!-- ===================== CONTROLLERS (middle) ===================== -->

  <!-- Arduino Uno -->
  <rect x="460" y="400" width="200" height="110" rx="8" fill="#eafbea" stroke="#2a9d3f" stroke-width="2.5"/>
  <text x="560" y="430" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Arduino Uno</text>
  <text x="560" y="450" font-size="12" text-anchor="middle" fill="#555">Real-time control:</text>
  <text x="560" y="467" font-size="12" text-anchor="middle" fill="#555">motor, servo,</text>
  <text x="560" y="484" font-size="12" text-anchor="middle" fill="#555">ultrasonic sensors</text>

  <!-- Buck converter to Arduino (5V logic) - routed right of L9110 box -->
  <path d="M 640 150 L 655 150 L 655 400" fill="none" stroke="#2266cc" stroke-width="3.5"/>

  <!-- L9110 to Arduino (signal, PWM/direction) -->
  <path d="M 550 310 L 550 400" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Servo -->
  <rect x="700" y="400" width="170" height="80" rx="8" fill="#fff8e8" stroke="#c98a1a" stroke-width="2"/>
  <text x="785" y="428" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Servo Motor</text>
  <text x="785" y="446" font-size="12" text-anchor="middle" fill="#555">Ackermann</text>
  <text x="785" y="463" font-size="12" text-anchor="middle" fill="#555">steering</text>

  <path d="M 660 425 L 700 425" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>
  <path d="M 900 400 L 900 190 L 640 190" fill="none" stroke="#2266cc" stroke-width="3"/>
  <path d="M 870 400 L 900 400" fill="none" stroke="#2266cc" stroke-width="3"/>

  <!-- Raspberry Pi 3B+ -->
  <rect x="120" y="400" width="220" height="110" rx="8" fill="#eafbea" stroke="#2a9d3f" stroke-width="2.5"/>
  <text x="230" y="430" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Raspberry Pi 3B+</text>
  <text x="230" y="450" font-size="12" text-anchor="middle" fill="#555">Vision, pillar color</text>
  <text x="230" y="467" font-size="12" text-anchor="middle" fill="#555">detection, lap</text>
  <text x="230" y="484" font-size="12" text-anchor="middle" fill="#555">counting logic</text>

  <!-- Buck converter to Pi (5V logic) -->
  <path d="M 460 150 L 230 150 L 230 400" fill="none" stroke="#2266cc" stroke-width="3.5"/>

  <!-- Push button to Pi (GPIO) -->
  <path d="M 335 255 L 335 350 L 230 350 L 230 400" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Pi <-> Arduino serial -->
  <path d="M 340 440 L 460 440" fill="none" stroke="#2a9d3f" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="400" y="430" font-size="11" text-anchor="middle" fill="#2a9d3f" font-style="italic">Serial (USB)</text>

  <!-- ===================== SENSORS (bottom) ===================== -->

  <!-- Camera -->
  <rect x="60" y="560" width="160" height="70" rx="8" fill="#f3eafd" stroke="#7a3fc4" stroke-width="2"/>
  <text x="140" y="588" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Camera v2</text>
  <text x="140" y="606" font-size="12" text-anchor="middle" fill="#555">(5MP, CSI)</text>
  <path d="M 140 560 L 140 510 L 230 510" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- TCS3200 -->
  <rect x="240" y="560" width="160" height="70" rx="8" fill="#f3eafd" stroke="#7a3fc4" stroke-width="2"/>
  <text x="320" y="588" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">TCS3200</text>
  <text x="320" y="606" font-size="12" text-anchor="middle" fill="#555">Color sensor (lap lines)</text>
  <path d="M 320 560 L 320 530 L 230 530" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Front ultrasonics x3 -->
  <rect x="460" y="560" width="150" height="70" rx="8" fill="#f3eafd" stroke="#7a3fc4" stroke-width="2"/>
  <text x="535" y="585" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Ultrasonic x3</text>
  <text x="535" y="603" font-size="12" text-anchor="middle" fill="#555">Front (obstacle/wall)</text>
  <path d="M 535 560 L 535 510" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Rear ultrasonic -->
  <rect x="630" y="560" width="150" height="70" rx="8" fill="#f3eafd" stroke="#7a3fc4" stroke-width="2"/>
  <text x="705" y="585" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Ultrasonic x1</text>
  <text x="705" y="603" font-size="12" text-anchor="middle" fill="#555">Rear (parking)</text>
  <path d="M 705 560 L 705 535 L 640 535 L 640 510" fill="none" stroke="#2a9d3f" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- ===================== NOTES BOX ===================== -->
  <rect x="60" y="700" width="1280" height="230" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="80" y="730" font-size="15" font-weight="bold" fill="#1a1a1a">Notes</text>
  <text x="80" y="758" font-size="13" fill="#333">1. Only one 11.1V LiPo battery is connected at any time via its T-plug connector. The second battery is a charged spare, swapped in manually — not wired in parallel.</text>
  <text x="80" y="782" font-size="13" fill="#333">2. Power splits at the main switch into two independent branches: (a) through the buck converter to a regulated 5V logic rail for the Pi, Arduino, and servo,</text>
  <text x="100" y="802" font-size="13" fill="#333">and (b) directly at 11.1V to the L9110 motor driver, isolating motor current spikes from the logic supply.</text>
  <text x="80" y="826" font-size="13" fill="#333">3. The push button is wired separately from the main power switch, satisfying the WRO requirement of one switch to power on + one button to start the program.</text>
  <text x="80" y="850" font-size="13" fill="#333">4. The Raspberry Pi and Arduino communicate over a serial (USB) connection: the Pi sends high-level driving commands based on camera/TCS3200 input, and the</text>
  <text x="100" y="870" font-size="13" fill="#333">Arduino executes real-time motor, servo, and ultrasonic control.</text>
  <text x="80" y="894" font-size="13" fill="#333">5. See README.md Section 2 for full sensor placement reasoning and Section 3 for the navigation/obstacle-handling strategy.</text>
</svg>
